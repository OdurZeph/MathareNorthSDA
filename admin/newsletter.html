<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Management - Mathare North SDA Church</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #D4AF37; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#0a2351] text-white p-6 flex-shrink-0">
            <div class="mb-12">
                <h2 class="text-xl font-bold">MN SDA Church</h2>
                <p class="text-sm text-gray-300 mt-1">Admin Dashboard</p>
            </div>
            <nav class="space-y-2">
                <a href="/admin/index.html" class="block px-4 py-2 rounded hover:bg-white/10 transition">Dashboard</a>
                <a href="/admin/newsletter.html" class="block px-4 py-2 rounded bg-[#D4AF37] text-black font-semibold">Newsletter</a>
                <a href="#" class="block px-4 py-2 rounded hover:bg-white/10 transition">Subscribers</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div class="max-w-7xl mx-auto">
                <h1 class="text-3xl font-bold text-[#0a2351] mb-8">Newsletter Management</h1>

                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="stats-container">
                    <div class="bg-white rounded-xl shadow p-6">
                        <h3 class="text-sm text-gray-500 uppercase tracking-wider">Total Subscribers</h3>
                        <p class="text-3xl font-bold text-[#0a2351] mt-2" id="total-subscribers">0</p>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6">
                        <h3 class="text-sm text-gray-500 uppercase tracking-wider">Active Subscribers</h3>
                        <p class="text-3xl font-bold text-green-600 mt-2" id="active-subscribers">0</p>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6">
                        <h3 class="text-sm text-gray-500 uppercase tracking-wider">Emails Sent</h3>
                        <p class="text-3xl font-bold text-[#0a2351] mt-2" id="emails-sent">0</p>
                    </div>
                    <div class="bg-white rounded-xl shadow p-6">
                        <h3 class="text-sm text-gray-500 uppercase tracking-wider">Pending Subscribers</h3>
                        <p class="text-3xl font-bold text-yellow-600 mt-2" id="pending-subscribers">0</p>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="bg-white rounded-xl shadow overflow-hidden">
                    <div class="flex border-b border-gray-200">
                        <button class="tab-btn px-6 py-3 font-semibold text-[#0a2351] border-b-2 border-[#D4AF37]" data-tab="compose">Compose Email</button>
                        <button class="tab-btn px-6 py-3 font-semibold text-gray-500 hover:text-[#0a2351] transition" data-tab="subscribers">Subscribers</button>
                        <button class="tab-btn px-6 py-3 font-semibold text-gray-500 hover:text-[#0a2351] transition" data-tab="drafts">Drafts</button>
                    </div>

                    <!-- Compose Email -->
                    <div class="p-6" id="compose-tab">
                        <form id="newsletter-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-sm font-medium text-gray-700">Subject</label>
                                    <input type="text" name="subject" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#D4AF37]" placeholder="Email Subject">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-medium text-gray-700">Category</label>
                                    <select name="category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#D4AF37]">
                                        <option value="Church Announcements">Church Announcements</option>
                                        <option value="Sabbath Programs">Sabbath Programs</option>
                                        <option value="Prayer Updates">Prayer Updates</option>
                                        <option value="Evangelism and Missions">Evangelism and Missions</option>
                                        <option value="Youth Ministry">Youth Ministry</option>
                                        <option value="Building Project Updates">Building Project Updates</option>
                                        <option value="Events and Seminars">Events and Seminars</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-medium text-gray-700">Email Content</label>
                                <textarea name="content" rows="12" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#D4AF37]" placeholder="Write your email here..."></textarea>
                            </div>
                            <div class="flex gap-4">
                                <button type="submit" name="action" value="save" class="px-6 py-3 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition">Save Draft</button>
                                <button type="submit" name="action" value="send" class="px-6 py-3 bg-[#D4AF37] text-black rounded-lg font-semibold hover:bg-yellow-500 transition">Send Now</button>
                            </div>
                        </form>
                    </div>

                    <!-- Subscribers -->
                    <div class="p-6 hidden" id="subscribers-tab">
                        <div class="flex flex-col md:flex-row justify-between md:items-center mb-6 gap-4">
                            <div class="flex gap-4">
                                <input type="text" id="search-subscribers" placeholder="Search subscribers..." class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#D4AF37]">
                                <select id="filter-status" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-[#D4AF37]">
                                    <option value="">All Statuses</option>
                                    <option value="active">Active</option>
                                    <option value="pending">Pending</option>
                                    <option value="unsubscribed">Unsubscribed</option>
                                </select>
                            </div>
                            <button id="export-csv" class="px-4 py-2 bg-[#0a2351] text-white rounded-lg font-semibold hover:bg-blue-900 transition">Export CSV</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-sm font-medium text-gray-700">Email</th>
                                        <th class="px-4 py-3 text-sm font-medium text-gray-700">Status</th>
                                        <th class="px-4 py-3 text-sm font-medium text-gray-700">Date Subscribed</th>
                                        <th class="px-4 py-3 text-sm font-medium text-gray-700">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="subscribers-table">
                                    <!-- Subscribers will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Drafts -->
                    <div class="p-6 hidden" id="drafts-tab">
                        <div class="space-y-4" id="drafts-container">
                            <!-- Drafts will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // Check authentication
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin/login.html';
                return;
            }

            // Load stats
            await loadStats();
            await loadSubscribers();
            await loadDrafts();

            // Tab handling
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.getAttribute('data-tab');
                    
                    // Update buttons
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('border-[#D4AF37]');
                        b.classList.add('text-gray-500');
                        b.classList.remove('text-[#0a2351]');
                    });
                    this.classList.add('border-[#D4AF37]');
                    this.classList.remove('text-gray-500');
                    this.classList.add('text-[#0a2351]');

                    // Update content
                    document.querySelectorAll('[id$="-tab"]').forEach(tab => {
                        tab.classList.add('hidden');
                    });
                    document.getElementById(`${tabName}-tab`).classList.remove('hidden');
                });
            });

            // Newsletter form
            document.getElementById('newsletter-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const action = e.submitter.value;
                
                const subject = formData.get('subject');
                const content = formData.get('content');
                const category = formData.get('category');

                if (action === 'save') {
                    // Save draft
                    try {
                        const response = await fetch('/api/newsletter/save-draft', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                subject,
                                content,
                                category
                            })
                        });

                        const result = await response.json();
                        if (result.success) {
                            alert('Draft saved successfully!');
                            await loadDrafts();
                        } else {
                            alert(result.message);
                        }
                    } catch (error) {
                        console.error('Save draft error:', error);
                        alert('Failed to save draft');
                    }
                } else if (action === 'send') {
                    // Send now
                    if (!confirm('Are you sure you want to send this email?')) {
                        return;
                    }
                    try {
                        const response = await fetch('/api/newsletter/send-newsletter', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                subject,
                                content,
                                category
                            })
                        });

                        const result = await response.json();
                        if (result.success) {
                            alert(`Success! ${result.data.sent} emails sent.`);
                            this.reset();
                            await loadStats();
                        } else {
                            alert(result.message);
                        }
                    } catch (error) {
                        console.error('Send error:', error);
                        alert('Failed to send newsletter');
                    }
                }
            });

            // Export CSV
            document.getElementById('export-csv').addEventListener('click', async function() {
                try {
                    const response = await fetch('/api/newsletter/subscribers/export', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'subscribers.csv';
                        a.click();
                        window.URL.revokeObjectURL(url);
                    }
                } catch (error) {
                    console.error('Export error:', error);
                    alert('Failed to export CSV');
                }
            });

            // Search subscribers
            const searchInput = document.getElementById('search-subscribers');
            searchInput.addEventListener('input', debounce(() => loadSubscribers(), 300));

            const statusFilter = document.getElementById('filter-status');
            statusFilter.addEventListener('change', loadSubscribers);
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/newsletter/stats', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('total-subscribers').textContent = result.data.subscribers.total;
                    document.getElementById('active-subscribers').textContent = result.data.subscribers.active;
                    document.getElementById('pending-subscribers').textContent = result.data.subscribers.pending;
                    document.getElementById('emails-sent').textContent = result.data.emails.sent;
                }
            } catch (error) {
                console.error('Load stats error:', error);
            }
        }

        async function loadSubscribers() {
            try {
                const search = document.getElementById('search-subscribers').value;
                const status = document.getElementById('filter-status').value;
                
                const params = new URLSearchParams();
                if (search) params.append('search', search);
                if (status) params.append('status', status);

                const response = await fetch(`/api/newsletter/subscribers?${params.toString()}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                
                const tbody = document.getElementById('subscribers-table');
                tbody.innerHTML = '';
                
                if (result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No subscribers found</td></tr>';
                    return;
                }
                
                result.data.forEach(sub => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-gray-100 hover:bg-gray-50';
                    tr.innerHTML = `
                        <td class="px-4 py-3">${sub.email}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 text-xs rounded-full ${
                                sub.status === 'active' ? 'bg-green-100 text-green-800' :
                                sub.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-gray-100 text-gray-800'
                            }">
                                ${sub.status}
                            </span>
                        </td>
                        <td class="px-4 py-3">${new Date(sub.date_subscribed || sub.created_at).toLocaleDateString()}</td>
                        <td class="px-4 py-3">
                            <div class="flex gap-2">
                                ${sub.status === 'unsubscribed' ? `
                                    <button onclick="reactivateSubscriber('${sub.id}')" class="text-blue-600 hover:text-blue-800">Reactivate</button>
                                ` : ''}
                                <button onclick="deleteSubscriber('${sub.id}')" class="text-red-600 hover:text-red-800">Delete</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Load subscribers error:', error);
            }
        }

        async function loadDrafts() {
            try {
                const response = await fetch('/api/newsletter/drafts', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                
                const container = document.getElementById('drafts-container');
                container.innerHTML = '';
                
                if (result.data.length === 0) {
                    container.innerHTML = '<p class="text-center py-8 text-gray-500">No drafts saved</p>';
                    return;
                }
                
                result.data.forEach(draft => {
                    const div = document.createElement('div');
                    div.className = 'bg-gray-50 rounded-lg p-4 border border-gray-200';
                    div.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-semibold text-[#0a2351]">${draft.subject}</h4>
                                <p class="text-sm text-gray-600 mt-1 line-clamp-2">${draft.content}</p>
                                <p class="text-xs text-gray-400 mt-2">Last edited: ${new Date(draft.updated_at).toLocaleString()}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="loadDraft(${draft.id})" class="text-[#D4AF37] hover:text-yellow-700 font-medium">Load</button>
                                <button onclick="deleteDraft(${draft.id})" class="text-red-600 hover:text-red-800">Delete</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Load drafts error:', error);
            }
        }

        window.reactivateSubscriber = async function(id) {
            if (!confirm('Are you sure you want to reactivate this subscriber?')) return;
            try {
                const response = await fetch(`/api/newsletter/subscribers/${id}/reactivate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                if (result.success) {
                    alert('Subscriber reactivated successfully');
                    await loadSubscribers();
                    await loadStats();
                }
            } catch (error) {
                console.error('Reactivate error:', error);
                alert('Failed to reactivate');
            }
        }

        window.deleteSubscriber = async function(id) {
            if (!confirm('Are you sure you want to delete this subscriber?')) return;
            try {
                const response = await fetch(`/api/newsletter/subscribers/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                if (result.success) {
                    alert('Subscriber deleted successfully');
                    await loadSubscribers();
                    await loadStats();
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Failed to delete');
            }
        }

        window.loadDraft = async function(id) {
            try {
                const response = await fetch('/api/newsletter/drafts', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                const draft = result.data.find(d => d.id === id);
                
                if (draft) {
                    document.querySelector('input[name="subject"]').value = draft.subject;
                    document.querySelector('textarea[name="content"]').value = draft.content;
                    document.querySelector('select[name="category"]').value = draft.category;
                    
                    document.querySelector('[data-tab="compose"]').click();
                }
            } catch (error) {
                console.error('Load draft error:', error);
            }
        }

        window.deleteDraft = async function(id) {
            if (!confirm('Are you sure you want to delete this draft?')) return;
            try {
                const response = await fetch(`/api/newsletter/drafts/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const result = await response.json();
                if (result.success) {
                    alert('Draft deleted successfully');
                    await loadDrafts();
                }
            } catch (error) {
                console.error('Delete draft error:', error);
                alert('Failed to delete draft');
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
</html>
