<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Subscription - Mathare North SDA Church</title>
    <!-- Preload critical font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <!-- Tailwind (defer non-critical CSS) -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-[#0f0f0f] rounded-2xl p-8 shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Verify Your Subscription</h1>
            <p class="text-gray-400">Almost done! Let's confirm your subscription.</p>
        </div>

        <div id="loading-state" class="text-center py-12">
            <div class="loader mx-auto mb-4 border-4 border-gray-700 border-t-[#D4AF37] rounded-full w-12 h-12 animate-spin"></div>
            <p class="text-gray-400">Verifying...</p>
        </div>

        <div id="success-state" class="hidden text-center py-12">
            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Welcome Aboard!</h2>
            <p class="text-gray-400 mb-8">Your subscription has been confirmed. You'll now receive our newsletter.</p>
            <a href="index.html" class="inline-block bg-[#D4AF37] text-black px-8 py-3 rounded-lg font-semibold hover:bg-yellow-500 transition">
                Go to Homepage
            </a>
        </div>

        <div id="error-state" class="hidden text-center py-12">
            <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Invalid Link</h2>
            <p class="text-gray-400 mb-8">This verification link is invalid or has expired.</p>
            <a href="index.html" class="inline-block bg-[#D4AF37] text-black px-8 py-3 rounded-lg font-semibold hover:bg-yellow-500 transition">
                Go to Homepage
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            
            if (!token) {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/verify-subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const result = await response.json();

                document.getElementById('loading-state').classList.add('hidden');
                
                if (result.success) {
                    document.getElementById('success-state').classList.remove('hidden');
                } else {
                    document.getElementById('error-state').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Verification error:', error);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
